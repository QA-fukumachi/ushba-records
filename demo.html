<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Submission | USHBA Records</title>
    <meta name="description"
        content="Submit your demo to USHBA Records. We are looking for pure techno frequencies and rawness.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Waterfall&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;900&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body class="demo-page">

    <!-- Top Navigation -->
    <header class="top-nav">
        <div class="nav-content">
            <a href="index.html" class="logo-small">USHBA.</a>
            <nav class="nav-links">
                <a href="releases.html" class="nav-btn">Releases</a>
                <a href="demo.html" class="nav-btn">Demo</a>
                <a href="https://soundcloud.com/ushbarecords" target="_blank" rel="noopener noreferrer"
                    class="nav-btn soundcloud-btn">Soundcloud</a>
                <a href="https://ushbarecords.bandcamp.com/album/everything-lasts-ep" target="_blank"
                    rel="noopener noreferrer" class="nav-btn bandcamp-btn">Bandcamp</a>
                <div class="nav-dropdown-wrapper">
                    <button class="nav-btn about-btn has-dropdown" aria-expanded="false">
                        About <span class="nav-dropdown-icon">▼</span>
                    </button>
                    <div class="nav-dropdown-content">
                        <a href="index.html#vision" class="nav-dropdown-link">Our Vision</a>
                        <a href="ushba.html" class="nav-dropdown-link">Mt. Ushba</a>
                        <a href="index.html#contact" class="nav-dropdown-link">Contact</a>
                    </div>
                </div>
            </nav>
            <!-- Mobile Menu Toggle -->
            <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobile-menu">
        <nav class="mobile-nav-links">
            <a href="releases.html" class="nav-btn">Releases</a>
            <a href="demo.html" class="nav-btn">Demo</a>
            <a href="https://soundcloud.com/ushbarecords" target="_blank" rel="noopener noreferrer"
                class="nav-btn">Soundcloud</a>
            <a href="https://ushbarecords.bandcamp.com/album/everything-lasts-ep" target="_blank"
                rel="noopener noreferrer" class="nav-btn">Bandcamp</a>
            <div class="mobile-dropdown-wrapper">
                <button class="nav-btn mobile-about-btn has-dropdown" aria-expanded="false">
                    About <span class="nav-dropdown-icon">▼</span>
                </button>
                <div class="mobile-dropdown-content">
                    <a href="index.html#vision" class="mobile-dropdown-link">Our Vision</a>
                    <a href="ushba.html" class="mobile-dropdown-link">Mt. Ushba</a>
                    <a href="index.html#contact" class="mobile-dropdown-link">Contact</a>
                </div>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <main class="demo-section">
        <div class="demo-content-wrapper">
            <h1 class="section-title">DEMO SUBMISSION</h1>
            <p class="demo-description">Send us your unreleased music. Please include private stream links.</p>
            
            <form action="https://api.web3forms.com/submit" method="POST" id="demo-form" class="demo-form">
                <input type="hidden" name="access_key" value="78f3d3b4-58e5-45c1-b3f8-447c152ace03">
                <input type="hidden" name="subject" value="New Demo Submission">
                
                <div class="form-group">
                    <label for="name">Artist name / Alias</label>
                    <input type="text" id="name" name="Artist name / Alias" required class="form-input">
                </div>
                
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" required class="form-input">
                </div>

                <div class="form-group">
                    <label for="demo-link">Link of demo tracks</label>
                    <textarea id="demo-link" name="Link of demo tracks" rows="3" required class="form-input form-textarea"></textarea>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required class="form-input form-textarea"></textarea>
                </div>
                
                <button type="submit" class="primary-btn submit-btn">Submit</button>
            </form>
        </div>
    </main>

    <!-- Main Footer -->
    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; 2026 USHBA Records. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Clear form on pageshow so going back doesn't leave data visible
        window.addEventListener('pageshow', function (event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                document.getElementById('demo-form').reset();
            }
            // Additional safety net fallback
            setTimeout(() => {
                document.getElementById('demo-form').reset();
            }, 10);
        });
    </script>
</body>

</html>
