<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USHBA Records | Techno Label</title>
    <meta name="description" content="Official website of USHBA Records, a premier techno music label.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Background Video -->
    <div class="video-container">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="Gif/Video Project 1 (1) (1).mp4" type="video/mp4">
            <!-- Fallback text inside video element -->
            Your browser does not support the video tag.
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- Top Navigation -->
    <header class="top-nav">
        <div class="nav-content">
            <a href="#" class="logo-small">USHBA.</a>
            <nav class="nav-links">
                <a href="https://soundcloud.com/ushbarecords" target="_blank" rel="noopener noreferrer"
                    class="nav-btn soundcloud-btn">Soundcloud</a>
                <a href="https://ushbarecords.bandcamp.com/album/everything-lasts-ep" target="_blank"
                    rel="noopener noreferrer" class="nav-btn bandcamp-btn">Bandcamp</a>
                <a href="#contact" class="nav-btn contact-btn">Contact</a>
            </nav>
            <!-- Mobile Menu Toggle -->
            <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobile-menu">
        <nav class="mobile-nav-links">
            <a href="https://soundcloud.com/ushbarecords" target="_blank" rel="noopener noreferrer"
                class="nav-btn">Soundcloud</a>
            <a href="https://ushbarecords.bandcamp.com/album/everything-lasts-ep" target="_blank"
                rel="noopener noreferrer" class="nav-btn">Bandcamp</a>
            <a href="#contact" class="nav-btn">Contact</a>
        </nav>
    </div>

    <!-- Main Content Here -->
    <main class="hero-section">
        <div class="hero-content">
            <h1 class="main-title">USHBA Rec.</h1>
            <p class="subtitle">PURE TECHNO FREQUENCIES</p>
            <div class="hero-actions">
                <a href="#releases" class="btn primary-btn">LATEST RELEASES</a>
            </div>
        </div>
    </main>

    <!-- Releases Section -->
    <section id="releases" class="releases-section">
        <h2 class="section-title">RELEASES</h2>

        <div class="releases-dropdown-container">
            <button class="release-subtitle dropdown-toggle" id="ushba001-toggle" aria-expanded="false">
                Fukumachi - Everything Lasts EP [USHBA001]
                <span class="dropdown-icon">▼</span>
            </button>

            <div class="releases-list dropdown-content" id="ushba001-content">
                <!-- Track 1: Vault Sessions Collective Premiere -->
                <div class="release-item">
                    <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"
                        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/vault-sessions-collective/premiere-fukumachi-everything-lasts-ushba001&color=%23000000&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
                </div>
                <!-- Track 2: Grab The Groove Premiere -->
                <div class="release-item">
                    <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"
                        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/grabthegroove/gtg-premiere-fukumachi-everything-lasts-ushba001&color=%23000000&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
                </div>
                <!-- Track 3: NovaFuture Premiere -->
                <div class="release-item">
                    <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"
                        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/novafuture/fukumachi-hedonism-full-track&color=%23000000&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
                </div>
                <!-- Track 4: BCCO Premiere -->
                <div class="release-item">
                    <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"
                        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/bcco/bcco-premiere-fukumachi-seventh-sense-ushba001&color=%23000000&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
